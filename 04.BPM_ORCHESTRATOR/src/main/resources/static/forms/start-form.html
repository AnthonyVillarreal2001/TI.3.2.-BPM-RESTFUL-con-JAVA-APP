<form role="form">
  <h3>Ingresar Datos de la Operación</h3>
  <hr>
  <div class="form-group">
    <label for="tipoOperacion">Tipo de Operación</label>
    <select class="form-control"
            cam-variable-name="tipoOperacion"
            cam-variable-type="String"
            required>
      <option value="TRANSFERENCIA">Transferencia</option>
      <option value="RETIRO">Retiro</option>
      <option value="DEPOSITO">Depósito</option>
      <option value="CONSULTA">Consulta</option>
    </select>
  </div>
  
  <div class="form-group">
    <label for="cuentaOrigen">Cuenta de Origen</label>
    <input class="form-control"
           cam-variable-name="cuentaOrigen"
           cam-variable-type="String"
           type="text"
           required />
  </div>
  
  <div class="form-group">
    <label for="cuentaDestino">Cuenta de Destino (Para Transferencias)</label>
    <input class="form-control"
           cam-variable-name="cuentaDestino"
           cam-variable-type="String"
           type="text" />
  </div>
  
  <div class="form-group">
    <label for="monto">Monto ($)</label>
    <input class="form-control"
           cam-variable-name="monto"
           cam-variable-type="Double"
           type="number"
           step="0.01"
           required />
  </div>
</form>
