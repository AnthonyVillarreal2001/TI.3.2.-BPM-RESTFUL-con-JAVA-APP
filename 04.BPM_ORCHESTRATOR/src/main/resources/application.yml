server:
  port: 8085

spring:
  application:
    name: eurekabank-bpm
  datasource:
    url: jdbc:h2:mem:camunda-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  h2:
    console:
      enabled: true

camunda:
  bpm:
    admin-user:
      id: demo
      password: demo
      firstName: Demo
    filter:
      create: All tasks
    database:
      schema-update: true
    generic-properties:
      properties:
        history: audit

eurekabank:
  api:
    base-url: http://localhost:8080 # Cambiar al puerto del servidor principal
